<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtDance - Editar Estudiante</title>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="student-styles.css">

    <script src="../env.js"></script>
    <script src="../auth-check.js"></script>
    <script src="../sidebar.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="module-header">
                <h1 id="edit-title">Modificar Estudiante</h1>
                <a href="students.html" class="btn-secondary">◁ Cancelar</a>
            </header>

            <div id="error-box" class="error-box hidden"></div>

            <section class="form-container">
                <form id="edit-student-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="edit-name">Nombre Completo *</label>
                            <input type="text" id="edit-name" required>
                        </div>

                        <div class="form-group">
                            <label for="edit-birth">Fecha de Nacimiento</label>
                            <input type="date" id="edit-birth">
                        </div>

                        <div class="form-group">
                            <label for="edit-district">Distrito *</label>
                            <select id="edit-district" required>
                                <option value="Iquitos">Iquitos</option>
                                <option value="Punchana">Punchana</option>
                                <option value="San Juan Bautista">San Juan Bautista</option>
                                <option value="Belén">Belén</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="edit-address">Dirección de Domicilio</label>
                            <input type="text" id="edit-address">
                        </div>

                        <div class="form-group">
                            <label for="edit-parent1-name">Nombre de Apoderado 1</label>
                            <input type="text" id="edit-parent1-name">
                        </div>

                        <div class="form-group">
                            <label for="edit-parent1-phone">Teléfono de Apoderado 1</label>
                            <input type="text" id="edit-parent1-phone">
                        </div>

                        <div class="form-group">
                            <label for="edit-parent2-name">Nombre de Apoderado 2</label>
                            <input type="text" id="edit-parent2-name">
                        </div>

                        <div class="form-group">
                            <label for="edit-parent2-phone">Teléfono de Apoderado 2</label>
                            <input type="text" id="edit-parent2-phone">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-success">Confirmar Cambios</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="edit_student.js"></script>
</body>
</html>
