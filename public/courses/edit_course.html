<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtDance - Re-programar Clase</title>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="course-styles.css">

    <script src="../env.js"></script>
    <script src="../auth-check.js"></script>
    <script src="../sidebar.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="module-header">
                <h1>Modificar Horario de Clase</h1>
                <a href="courses.html" class="btn-secondary">◁ Cancelar</a>
            </header>

            <div id="error-box" class="error-box hidden"></div>

            <section class="form-container">
                <form id="edit-course-form">
                    
                    <div class="form-group">
                        <label>Especialidad / Curso (No editable)</label>
                        <div id="course-name-display" class="read-only-highlight">Cargando...</div>
                    </div>

                    <hr class="form-divider">

                    <h3>📅 Actualización de Profesor y Horario</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="teacher-select">Profesor Encargado *</label>
                            <select id="teacher-select" required>
                                <option value="">Cargando profesores...</option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label>Días de la Semana *</label>
                            <div class="days-selector-container">
                                <label class="day-btn"><input type="checkbox" name="class-days" value="MON"><span>Coreografía / Lun</span></label>
                                <label class="day-btn"><input type="checkbox" name="class-days" value="TUE"><span>Mar</span></label>
                                <label class="day-btn"><input type="checkbox" name="class-days" value="WED"><span>Mié</span></label>
                                <label class="day-btn"><input type="checkbox" name="class-days" value="THU"><span>Jue</span></label>
                                <label class="day-btn"><input type="checkbox" name="class-days" value="FRI"><span>Vie</span></label>
                                <label class="day-btn"><input type="checkbox" name="class-days" value="SAT"><span>Sáb</span></label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="start-hour">Hora de Inicio *</label>
                            <input type="time" id="start-hour" required>
                        </div>

                        <div class="form-group">
                            <label for="end-hour">Hora de Fin *</label>
                            <input type="time" id="end-hour" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-submit" class="btn-success">Guardar Cambios</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="edit_course.js"></script>
</body>
</html>
